<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>苏沪造价速算 V1.6-南京基准</title>
<style>
 :root { --primary: #e63946; --bg: #f8f9fa; --dark: #1d3557; --gold: #ffb703; }
 * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); padding: 15px; margin: 0; color: #333; }
 .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
 h1 { font-size: 22px; text-align: center; margin: 0; color: var(--dark); }
 .version { text-align: center; font-size: 11px; color: #666; margin: 5px 0 20px 0; padding: 4px; background: #eee; border-radius: 4px; }
 
 .group { margin-bottom: 15px; }
 label { display: block; font-size: 13px; margin-bottom: 6px; color: #666; font-weight: bold; }
 select, input { 
 width: 100%; height: 50px; border: 2px solid #edf2f4; border-radius: 12px; 
 padding: 0 12px; font-size: 16px; background: #fff; appearance: none; outline: none; transition: 0.3s;
 }
 select:focus, input:focus { border-color: var(--primary); }

 .btn-calc { 
 width: 100%; height: 55px; background: var(--primary); color: #fff; 
 border: none; border-radius: 15px; font-size: 18px; font-weight: bold; 
 margin-top: 10px; cursor: pointer;
 }

 #result { 
 display: none; margin-top: 20px; padding: 20px; background: var(--dark); 
 color: #fff; border-radius: 16px; text-align: center; border: 2px solid var(--gold);
 }
 .res-price { font-size: 38px; font-weight: 800; color: var(--gold); margin: 10px 0; }
 .copy-hint { font-size: 11px; color: #a8dadc; margin-top: 12px; }
</style>
</head>
<body>

<div class="container">
 <h1>🏗️ 造价速算 (V1.6)</h1>
 <div class="version">核心基准：南京 2025Q3 亲测数据</div>

 <div class="group">
 <label>选择城市</label>
 <select id="city">
 <option value="上海">上海 (南京 × 1.04)</option>
 <option value="南京" selected>南京 (基准 1.00)</option>
 <option value="苏州">苏州 (南京 × 0.98)</option>
 <option value="无锡">无锡 (南京 × 0.96)</option>
 <option value="常州">常州 (南京 × 0.94)</option>
 <option value="镇江">镇江 (南京 × 0.92)</option>
 </select>
 </div>

 <div class="group">
 <label>工程类型</label>
 <select id="type">
 <option value="residential">普通住宅 (框架/剪力墙)</option>
 <option value="factory">钢结构厂房 (单层)</option>
 <option value="office">办公楼 (框架结构)</option>
 <option value="road">道路场地 (20cm混凝土)</option>
 </select>
 </div>

 <div class="group">
 <label>规格/楼层</label>
 <select id="floor">
 <option value="low">1-6层 (砖混/低层)</option>
 <option value="mid" selected>7-11层 (小高层框架)</option>
 <option value="high">12-18层 (高层剪力墙)</option>
 </select>
 </div>

 <div class="group">
 <label>建筑面积 (㎡)</label>
 <input type="number" id="area" placeholder="例如: 10000" inputmode="decimal">
 </div>

 <div class="group">
 <label>材料波动/其他修正 (%)</label>
 <input type="number" id="wave" value="0">
 </div>

 <button class="btn-calc" onclick="doCalculate()">核实版数据计算</button>

 <div id="result" onclick="copyResult()">
 <div style="font-size: 14px; opacity: 0.8;">估算总造价</div>
 <div class="res-price">¥ <span id="total-val">0</span></div>
 <div style="font-size: 16px;">单价：¥ <span id="unit-val">0</span> /㎡</div>
 <div class="copy-hint">基于南京亲测数据校准 | 点击复制结果</div>
 </div>
</div>

<script>
function doCalculate() {
 const city = document.getElementById('city').value;
 const type = document.getElementById('type').value;
 const floor = document.getElementById('floor').value;
 const area = parseFloat(document.getElementById('area').value) || 0;
 const wave = 1 + (parseFloat(document.getElementById('wave').value) / 100);

 if (area <= 0) { alert('请输入面积'); return; }

 // --- 核心基准逻辑 (完全对齐南京核实数据) ---
 // 以南京 7-11层 框架住宅为锚点 = 1800 元/㎡
 let njBase = 0;
 if (type === 'residential') njBase = 1800; 
 if (type === 'factory') njBase = 1270; 
 if (type === 'office') njBase = 2650; 
 if (type === 'road') njBase = 275; 

 // --- 城市折减系数 (以南京为 1.0) ---
 const cityMap = { 
 "上海": 1.04, 
 "南京": 1.00, 
 "苏州": 0.98, 
 "无锡": 0.96, 
 "常州": 0.94, 
 "镇江": 0.92 
 };
 const cF = cityMap[city];

 // --- 结构规格修正 ---
 let sF = 1.0;
 if (type === 'residential') {
 if (floor === 'low') sF = 0.88; // 砖混
 if (floor === 'high') sF = 1.12; // 剪力墙
 }

 // 最终单价计算
 const finalUnit = Math.round(njBase * cF * sF * wave);
 const finalTotal = (finalUnit * area / 10000).toFixed(2);

 document.getElementById('unit-val').textContent = finalUnit;
 document.getElementById('total-val').textContent = finalTotal + " 万";
 document.getElementById('result').style.display = 'block';
 document.getElementById('result').scrollIntoView({behavior: 'smooth'});
}

function copyResult() {
 const u = document.getElementById('unit-val').textContent;
 const t = document.getElementById('total-val').textContent;
 const c = document.getElementById('city').value;
 const txt = `【造价速算-南京基准版】\n城市：${c}\n单价：¥${u}/㎡\n总价：${t}\n(注：此数据已根据南京核实案例校准)`;
 navigator.clipboard.writeText(txt).then(() => alert('已复制到剪贴板'));
}
</script>

</body>
</html>
